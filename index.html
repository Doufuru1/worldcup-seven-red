<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DevLend - AI资产质押平台</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 动态内容渲染区域 -->
    </div>

    <!-- 底部导航栏 -->
    <nav class="bottom-nav">
        <button class="bottom-nav-item active" data-page="home">
            <span class="bottom-nav-icon">🏠</span>
            <span class="bottom-nav-label">首页</span>
        </button>
        <button class="bottom-nav-item" data-page="mining">
            <span class="bottom-nav-icon">⛏️</span>
            <span class="bottom-nav-label">算力挖矿</span>
        </button>
        <button class="bottom-nav-item" data-page="trade">
            <span class="bottom-nav-icon">🔄</span>
            <span class="bottom-nav-label">交易</span>
        </button>
        <button class="bottom-nav-item" data-page="nodes">
            <span class="bottom-nav-icon">🌐</span>
            <span class="bottom-nav-label">节点</span>
        </button>
        <button class="bottom-nav-item" data-page="profile">
            <span class="bottom-nav-icon">👤</span>
            <span class="bottom-nav-label">我的</span>
        </button>
    </nav>

    <!-- 钱包连接弹窗 -->
    <div class="modal-overlay" id="walletModal">
        <div class="bottom-sheet">
            <div class="bottom-sheet-handle"></div>
            <div class="bottom-sheet-header">
                <h3>连接钱包</h3>
                <button class="sheet-close" id="walletModalClose">✕</button>
            </div>
            <div class="bottom-sheet-body">
                <div class="wallet-list">
                    <button class="wallet-card" data-wallet="metamask">
                        <span class="wallet-card-icon">🦊</span>
                        <span class="wallet-card-name">MetaMask</span>
                    </button>
                    <button class="wallet-card" data-wallet="walletconnect">
                        <span class="wallet-card-icon">🔗</span>
                        <span class="wallet-card-name">WalletConnect</span>
                    </button>
                    <button class="wallet-card" data-wallet="tronlink">
                        <span class="wallet-card-icon">👛</span>
                        <span class="wallet-card-name">TronLink</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 领取奖励弹窗 -->
    <div class="modal-overlay" id="claimModal">
        <div class="bottom-sheet">
            <div class="bottom-sheet-handle"></div>
            <div class="bottom-sheet-header">
                <h3>领取奖励</h3>
                <button class="sheet-close" id="claimModalClose">✕</button>
            </div>
            <div class="bottom-sheet-body" style="text-align: center;">
                <p style="color: var(--text-secondary); margin-bottom: 8px;">可领取收益</p>
                <div class="claim-amount" id="claimAmount">0.00 USDT</div>
                <button class="submit-btn" id="confirmClaim">立即领取</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon">✅</span>
        <span class="toast-message" id="toastMessage">操作成功</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
